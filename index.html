<!DOCTYPE html>
<html>
<head>
  <title>Playa de Pineland</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
    }
    .hero {
      background: linear-gradient(to bottom, #e8d8b0, #ffffff);
      padding: 80px 20px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }
    h2 {
      font-weight: normal;
      color: #555;
      margin-bottom: 30px;
    }
    .btn {
      padding: 15px 30px;
      background: black;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }
    .section {
      padding: 50px 20px;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Playa de Pineland</h1>
    <h2>Your Backyard Beach Volleyball Experience</h2>
    <button class="btn">Book a Session</button>
  </div>

  <div class="section">
    <h2>Private Coaching</h2>
    <p>1-on-1 and small group training sessions on a private sand court.</p>
  </div>

  <div class="section">
    <h2>Location</h2>
    <p>Private court in Fairfax, VA</p>
  </div>

</body>
</html>
